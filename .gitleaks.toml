# AgentGuide gitleaks configuration
# Extends default rules with project-specific overrides.
# v8.30.1

[extend]
useDefault = true

# Allow documented placeholder secrets in the guide itself
[allowlist]
description = "Documentation example secrets used in the guide"
regexes = [
    '''(?i)your[-_](secret|api)[-_](key|token)''',
    '''(?i)example[-_](key|token|secret|password)''',
    '''REDACTED''',
    '''your-actual-secret''',
]
